name: CI (macOS)
on:
  workflow_call:
    inputs:
      features:
        type: string
jobs:
  build:
    name: macOS
    runs-on: macos-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Update Rust
      run: rustup update stable
    - name: Run tests
      run: cargo test --features "${{ inputs.features }}" -r
